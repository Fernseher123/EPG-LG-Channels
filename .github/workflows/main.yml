name: Update LG Channels EPG (DE)

on:
  schedule:
    - cron: '0 */6 * * *'   # alle 6 Stunden
  workflow_dispatch:         # erlaubt manuelles Starten über den "Actions"-Tab

permissions:
  contents: write            # nötig, damit der Bot Änderungen zurückcommitten darf

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Skript ausführen
        run: python Iniciar.py

      - name: Änderungen committen und pushen
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lg_channels_de.m3u lg_epg_de.xml
          git diff --quiet --cached || git commit -m "Automatisches EPG/M3U-Update (DE)"
          git push
